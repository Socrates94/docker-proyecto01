name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build test image
        run: docker build -t react-app-test -f Dockerfile.dev .

      - name: Run tests
        # El entorno CI=true es crucial en React para que las pruebas terminen y no se queden escuchando cambios
        run: docker run -e CI=true react-app-test npm run test
